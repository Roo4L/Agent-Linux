<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 14" width="320" height="140" shape-rendering="crispEdges">
  <style>
    .o { fill: #d97757; }
    .d { fill: #b5604a; }
    .e { fill: #1a1a1a; }
    .w { fill: #e0e0e0; }
    .g { fill: #2a2a2a; }
    .r { fill: #888888; }
    .wl { fill: #555555; }
  </style>

  <!-- === BIG HOUSE (right side) === -->

  <!-- Chimney -->
  <rect class="r" x="27" y="0" width="1" height="2"/>

  <!-- Roof (white triangle) -->
  <rect class="w" x="24" y="1" width="2" height="1"/>
  <rect class="w" x="23" y="2" width="4" height="1"/>
  <rect class="w" x="22" y="3" width="6" height="1"/>
  <rect class="w" x="21" y="4" width="8" height="1"/>
  <rect class="w" x="20" y="5" width="10" height="1"/>

  <!-- Eaves -->
  <rect class="r" x="19" y="6" width="12" height="1"/>

  <!-- Walls (fill) -->
  <rect class="wl" x="20" y="7" width="10" height="6"/>

  <!-- Wall edges -->
  <rect class="r" x="20" y="7" width="1" height="6"/>
  <rect class="r" x="29" y="7" width="1" height="6"/>
  <rect class="r" x="20" y="7" width="10" height="1"/>

  <!-- Left window (2x2) -->
  <rect class="w" x="21" y="8" width="2" height="2"/>

  <!-- Right window (2x2) -->
  <rect class="w" x="27" y="8" width="2" height="2"/>

  <!-- Door (open, dark) -->
  <rect class="e" x="24" y="10" width="2" height="3"/>

  <!-- Door handle -->
  <rect class="w" x="25" y="11" width="1" height="1"/>


  <!-- === CLAWD (left side, cute crab) === -->

  <!-- Eye stalks -->
  <rect class="o" x="8" y="5" width="1" height="1"/>
  <rect class="o" x="12" y="5" width="1" height="1"/>

  <!-- Eyes on stalks -->
  <rect class="e" x="8" y="6" width="1" height="1"/>
  <rect class="e" x="12" y="6" width="1" height="1"/>

  <!-- Left claw (pincer shape) -->
  <rect class="o" x="5" y="7" width="1" height="1"/>
  <rect class="o" x="6" y="7" width="1" height="1"/>
  <rect class="o" x="5" y="8" width="1" height="1"/>
  <rect class="d" x="6" y="8" width="1" height="1"/>

  <!-- Right claw (pincer shape) -->
  <rect class="o" x="13" y="7" width="1" height="1"/>
  <rect class="o" x="14" y="7" width="1" height="1"/>
  <rect class="o" x="14" y="8" width="1" height="1"/>
  <rect class="d" x="13" y="8" width="1" height="1"/>

  <!-- Head (7px wide) -->
  <rect class="o" x="7" y="7" width="7" height="1"/>

  <!-- Body wide (9px, wider than head = crab shape) -->
  <rect class="o" x="6" y="8" width="9" height="1"/>

  <!-- Body with shell detail -->
  <rect class="o" x="6" y="9" width="9" height="1"/>
  <rect class="d" x="7" y="9" width="1" height="1"/>
  <rect class="d" x="9" y="9" width="1" height="1"/>
  <rect class="d" x="11" y="9" width="1" height="1"/>
  <rect class="d" x="13" y="9" width="1" height="1"/>

  <!-- Body taper (7px) -->
  <rect class="o" x="7" y="10" width="7" height="1"/>

  <!-- Legs (6, spread out) -->
  <rect class="o" x="6" y="11" width="1" height="1"/>
  <rect class="o" x="8" y="11" width="1" height="1"/>
  <rect class="o" x="10" y="11" width="1" height="1"/>
  <rect class="o" x="12" y="11" width="1" height="1"/>

  <!-- Feet (spread wider) -->
  <rect class="o" x="5" y="12" width="1" height="1"/>
  <rect class="o" x="9" y="12" width="1" height="1"/>
  <rect class="o" x="11" y="12" width="1" height="1"/>
  <rect class="o" x="15" y="12" width="1" height="1"/>


  <!-- Ground -->
  <rect class="g" x="0" y="13" width="32" height="1"/>
</svg>
