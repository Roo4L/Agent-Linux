<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 13" width="320" height="130" shape-rendering="crispEdges">
  <style>
    .o { fill: #d97757; }
    .d { fill: #b5604a; }
    .e { fill: #1a1a1a; }
    .w { fill: #e0e0e0; }
    .g { fill: #2a2a2a; }
    .r { fill: #888888; }
    .wl { fill: #555555; }
  </style>

  <!-- === CLAWD (left side, compact round crab) === -->

  <!-- Claw tips -->
  <rect class="o" x="4" y="5" width="1" height="1"/>
  <rect class="o" x="14" y="5" width="1" height="1"/>

  <!-- Left claw -->
  <rect class="o" x="4" y="6" width="1" height="1"/>
  <rect class="o" x="5" y="6" width="1" height="1"/>
  <rect class="d" x="4" y="7" width="1" height="1"/>

  <!-- Right claw -->
  <rect class="o" x="13" y="6" width="1" height="1"/>
  <rect class="o" x="14" y="6" width="1" height="1"/>
  <rect class="d" x="14" y="7" width="1" height="1"/>

  <!-- Body head row (7px wide, with eyes) -->
  <rect class="o" x="6" y="6" width="7" height="1"/>
  <rect class="e" x="8" y="6" width="1" height="1"/>
  <rect class="e" x="10" y="6" width="1" height="1"/>

  <!-- Body widest row (9px) -->
  <rect class="o" x="5" y="7" width="9" height="1"/>

  <!-- Body with shell stripes (9px) -->
  <rect class="o" x="5" y="8" width="9" height="1"/>
  <rect class="d" x="6" y="8" width="1" height="1"/>
  <rect class="d" x="8" y="8" width="1" height="1"/>
  <rect class="d" x="10" y="8" width="1" height="1"/>
  <rect class="d" x="12" y="8" width="1" height="1"/>

  <!-- Body bottom taper (7px) -->
  <rect class="o" x="6" y="9" width="7" height="1"/>

  <!-- Legs (4) -->
  <rect class="o" x="5" y="10" width="1" height="1"/>
  <rect class="o" x="7" y="10" width="1" height="1"/>
  <rect class="o" x="11" y="10" width="1" height="1"/>
  <rect class="o" x="13" y="10" width="1" height="1"/>

  <!-- Feet (4, spread wider) -->
  <rect class="o" x="4" y="11" width="1" height="1"/>
  <rect class="o" x="8" y="11" width="1" height="1"/>
  <rect class="o" x="10" y="11" width="1" height="1"/>
  <rect class="o" x="14" y="11" width="1" height="1"/>


  <!-- === HOUSE (right side, classic house shape) === -->

  <!-- Chimney -->
  <rect class="r" x="27" y="3" width="1" height="2"/>

  <!-- Roof triangle -->
  <rect class="w" x="25" y="4" width="2" height="1"/>
  <rect class="w" x="24" y="5" width="4" height="1"/>
  <rect class="w" x="23" y="6" width="6" height="1"/>
  <rect class="r" x="22" y="7" width="8" height="1"/>

  <!-- Walls (fill) -->
  <rect class="wl" x="23" y="8" width="6" height="4"/>

  <!-- Wall left and right edges -->
  <rect class="r" x="23" y="8" width="1" height="4"/>
  <rect class="r" x="28" y="8" width="1" height="4"/>

  <!-- Top wall edge -->
  <rect class="r" x="23" y="8" width="6" height="1"/>

  <!-- Windows (lit up) -->
  <rect class="w" x="24" y="9" width="1" height="1"/>
  <rect class="w" x="27" y="9" width="1" height="1"/>

  <!-- Door (open, dark, inviting) -->
  <rect class="e" x="25" y="10" width="2" height="2"/>

  <!-- Door handle -->
  <rect class="w" x="26" y="10" width="1" height="1"/>


  <!-- Ground line -->
  <rect class="g" x="0" y="12" width="32" height="1"/>
</svg>
