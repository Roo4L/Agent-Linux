name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Writes to the gh-pages branch (paired with pr-preview.yml so PR previews
# can live alongside production at /pr-preview/pr-N/). Pages source must be
# set to "Deploy from a branch: gh-pages / (root)" — see scripts or run:
#   gh api -X PUT repos/$OWNER/$REPO/pages \
#     -f 'source[branch]=gh-pages' -f 'source[path]=/' -f build_type=legacy
permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Pattern 5 (Pitfall 7 anti-drift) — the canonical curl-installer lives
      # at packaging/curl-installer/install.sh (Plan 06-02). Pages must serve
      # those exact bytes at agentlinux.org/install.sh so the documented
      # `curl https://agentlinux.org/install.sh | sudo bash` UX works. A
      # sync-on-deploy `cp` avoids two maintained copies (the repo-root copy
      # is gitignored and CI-generated on every Pages deploy).
      - name: Stage install.sh for GH Pages (Pattern 5 — Pitfall 7 anti-drift)
        run: cp packaging/curl-installer/install.sh install.sh
      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          # clean-exclude protects pr-preview/* from being wiped by prod deploys.
          # Without this, every push to master would delete all open PR previews.
          clean-exclude: |
            pr-preview/
          single-commit: true
