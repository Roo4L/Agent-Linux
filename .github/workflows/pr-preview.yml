name: PR Preview (website)

on:
  pull_request:
    branches: [master]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'CNAME'
      - 'sitemap.xml'
      - 'robots.txt'
      - 'packaging/curl-installer/install.sh'
      - '.github/workflows/pr-preview.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      # Mirrors deploy.yml so the preview ships the same install.sh bytes
      # served at agentlinux.org/install.sh.
      - name: Stage install.sh (mirror deploy.yml)
        run: cp packaging/curl-installer/install.sh install.sh

      - name: Assemble preview bundle
        run: |
          mkdir -p _preview
          rsync -a \
            --exclude='_preview/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.planning/' \
            --exclude='.claude/' \
            --exclude='agents/' \
            --exclude='docs/' \
            --exclude='packaging/' \
            --exclude='packer/' \
            --exclude='plugin/' \
            --exclude='scripts/' \
            --exclude='tests/' \
            ./ _preview/

      - name: Upload preview artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-preview
          path: _preview/
          retention-days: 14

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-comment -->';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = '${{ steps.upload.outputs.artifact-url }}';
            const body = [
              marker,
              '### Website preview built',
              '',
              `Commit: \`${sha}\``,
              `Artifact: ${artifactUrl}`,
              `Run: ${runUrl}`,
              '',
              'Download the artifact and open `index.html` locally to preview the site.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
