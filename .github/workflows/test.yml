name: test
on:
  push:
    branches-ignore: [master]
    paths-ignore:
      - 'index.html'
      - 'assets/**'
      - 'CNAME'
      - 'sitemap.xml'
      - 'robots.txt'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'index.html'
      - 'assets/**'
      - 'CNAME'
      - 'sitemap.xml'
      - 'robots.txt'

# v0.4.0 CIPUB-01: explicit least-privilege default. Individual jobs may
# narrow further (or, in the publish-only path of release.yml, escalate
# to contents:write). Public-repo posture: never inherit the runner's
# implicit default token permissions; pin them per workflow.
permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pre-commit
        run: pip install pre-commit==4.0.1
      # The catalog-schema-validate hook runs `node plugin/cli/scripts/
      # validate-catalog.mjs` which imports `ajv`. Install plugin/cli deps so
      # the hook can resolve its imports.
      - name: Enable pnpm via corepack
        run: corepack enable
      - name: Install plugin/cli deps (ajv for catalog-schema-validate hook)
        working-directory: plugin/cli
        run: pnpm install --frozen-lockfile
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  cli-unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Skip if plugin/cli has no source yet
        id: guard
        run: |
          if compgen -G "plugin/cli/test/*.test.*" > /dev/null || compgen -G "plugin/cli/test/**/*.test.*" > /dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No CLI tests yet — skipping (Phase 1 skeleton)"
          fi
      - name: Enable pnpm via corepack
        if: steps.guard.outputs.has_tests == 'true'
        run: corepack enable
      - name: Install deps
        if: steps.guard.outputs.has_tests == 'true'
        working-directory: plugin/cli
        run: pnpm install --frozen-lockfile
      - name: Compile CLI tests
        if: steps.guard.outputs.has_tests == 'true'
        working-directory: plugin/cli
        run: pnpm exec tsc -p tsconfig.test.json
      # Use explicit *.test.js glob — see release.yml for rationale.
      - name: Run tests
        if: steps.guard.outputs.has_tests == 'true'
        working-directory: plugin/cli
        shell: bash
        run: pnpm exec node --test dist-test/test/*.test.js

  # SEC-05 (v0.4.0 Phase 8): full-history gitleaks gate. The pre-commit job
  # above runs gitleaks against staged files only (fast-feedback path). This
  # job re-runs gitleaks across the full clone history so a bypassed commit
  # (--no-verify, force push, merged PR with stale hooks) still gets caught.
  # Configured via .gitleaks.toml (extends upstream defaults + allowlists
  # .planning/*.md per ADR-014).
  gitleaks:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      # gitleaks-action@v2 fetches PR commits via
      # /repos/{owner}/{repo}/pulls/{n}/commits on pull_request events;
      # without pull-requests: read the API call returns 403.
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so gitleaks can scan every commit, not just the
          # PR's tip.
          fetch-depth: 0
      - name: Run gitleaks (full history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true

  bats-docker:
    runs-on: ubuntu-24.04
    # The almalinux-9 arm is EXPERIMENTAL until Phase 20 (PAR-01) drives the full
    # bats contract green on EL9. Phase 19 (HARN-01) only guarantees the suite is
    # INVOKABLE on the substrate, so the arm is red-by-design for now. Mark it
    # continue-on-error so its expected redness reports without failing this
    # gating job or blocking PRs / the release `needs:` chain. Phase 20 removes
    # the `experimental` flag once EL9 is green; Phase 22 (REL-01) makes it a hard
    # gate alongside the QEMU row.
    continue-on-error: ${{ matrix.experimental || false }}
    # The full Phase 2–6 acceptance suite (200+ bats tests) does real apt/npm
    # installs, agent installs (Claude Code / GSD / Playwright), `claude update`,
    # and brownfield E2E across five invocation modes — ~30–40 min on a cold CI
    # runner, well past the original ~2–5 min Phase-1 estimate (the suite has
    # grown ~10x since). timeout-minutes is a CAP (the job ends the moment bats
    # finishes), so it is sized generously to absorb runner variance + a cold
    # Docker build without flaky re-timeouts; it still bounds a genuinely stuck
    # run (e.g. a hung systemctl is-system-running wait).
    timeout-minutes: 60
    strategy:
      # Phase 2 acceptance matrix: every supported Ubuntu LTS version runs on
      # every PR. fail-fast=false so a single arm failure still reports the
      # others — Phase 6 release gate needs to see all arms. AGE-11 added
      # 26.04 ("Resolute Raccoon") on 2026-04-26.
      fail-fast: false
      matrix:
        target:
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-26.04
          - almalinux-9
        include:
          # almalinux-9 is red-by-design until Phase 20 — flag it experimental so
          # the job-level continue-on-error above lets it fail without blocking.
          - target: almalinux-9
            experimental: true
    steps:
      - uses: actions/checkout@v5
      # Empty-plugin guard from Phase 1: still useful. After Phase 2 lands the
      # tests/bats/*.bats files the guard falls through to the real run. If a
      # future revert removes the bats suite the job short-circuits rather
      # than fails opaquely in Docker.
      - name: Skip if no bats suite yet
        id: guard
        run: |
          if compgen -G "tests/bats/*.bats" > /dev/null; then
            echo "has_bats=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_bats=false" >> "$GITHUB_OUTPUT"
            echo "No bats suite yet — skipping (lands in Phase 2)"
          fi
      - name: Run Docker bats matrix
        if: steps.guard.outputs.has_bats == 'true'
        run: bash tests/docker/run.sh ${{ matrix.target }}
