name: release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.3.0)
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ -n "$INPUT_TAG" ]]; then
            echo "value=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release tarball
        id: build
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Refusing to build: tag '$TAG' does not match vX.Y.Z[-suffix]"
            exit 1
          fi
          if [[ -x scripts/build-release.sh ]]; then
            bash scripts/build-release.sh "$TAG"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "::error::scripts/build-release.sh missing on a tag build — refusing to publish placeholder"
            exit 1
          else
            echo "Non-tag build and no build script — emitting empty placeholder for dry-run (Phase 6 lands the real build)."
            mkdir -p dist
            : > "dist/agentlinux-${TAG}.tar.gz"
            sha256sum "dist/agentlinux-${TAG}.tar.gz" > "dist/agentlinux-${TAG}.tar.gz.sha256"
          fi
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agentlinux-*.tar.gz
            dist/agentlinux-*.tar.gz.sha256
