name: release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.3.0)
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release tarball
        id: build
        run: |
          if [[ -x scripts/build-release.sh ]]; then
            bash scripts/build-release.sh "${{ steps.tag.outputs.value }}"
          else
            echo "scripts/build-release.sh not present yet — Phase 6 lands it. Emitting an empty placeholder so the workflow passes on an empty-plugin tag."
            mkdir -p dist
            echo "placeholder" > dist/agentlinux-${{ steps.tag.outputs.value }}.tar.gz
            sha256sum dist/agentlinux-${{ steps.tag.outputs.value }}.tar.gz > dist/agentlinux-${{ steps.tag.outputs.value }}.tar.gz.sha256
          fi
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agentlinux-*.tar.gz
            dist/agentlinux-*.tar.gz.sha256
