<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #0a0a0a; }
      .title { fill: #ffffff; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 72px; font-weight: 700; }
      .subtitle { fill: #a0a0a0; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 32px; font-weight: 400; }
      .o { fill: #d97757; }
      .w { fill: #ffffff; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="1200" height="630"/>
  <!-- Crab mascot (pixel art, scaled up) -->
  <g transform="translate(480, 80) scale(8)">
    <!-- Claws -->
    <rect class="o" x="0" y="4" width="2" height="2"/>
    <rect class="o" x="28" y="4" width="2" height="2"/>
    <!-- Arms -->
    <rect class="o" x="2" y="4" width="2" height="2"/>
    <rect class="o" x="26" y="4" width="2" height="2"/>
    <!-- Body top -->
    <rect class="o" x="8" y="2" width="14" height="2"/>
    <!-- Body with eyes -->
    <rect class="o" x="4" y="4" width="22" height="2"/>
    <rect class="w" x="8" y="4" width="2" height="2"/>
    <rect class="w" x="20" y="4" width="2" height="2"/>
    <!-- Body middle -->
    <rect class="o" x="4" y="6" width="22" height="2"/>
    <!-- Body taper -->
    <rect class="o" x="8" y="8" width="14" height="2"/>
    <!-- Feet -->
    <rect class="o" x="8" y="10" width="2" height="2"/>
    <rect class="o" x="14" y="10" width="2" height="2"/>
    <rect class="o" x="20" y="10" width="2" height="2"/>
  </g>
  <!-- Title -->
  <text class="title" x="600" y="420" text-anchor="middle">AgentLinux</text>
  <!-- Subtitle -->
  <text class="subtitle" x="600" y="470" text-anchor="middle">Linux, for agents</text>
</svg>
