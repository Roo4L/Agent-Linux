# .pre-commit-config.yaml
# Copied verbatim from docs/HARNESS.md §1.2 — authoritative spec.
# Covers: bash (shellcheck + shfmt), TS/JS + JSON (biome), catalog JSON Schema.
# Runs locally on `pre-commit run --all-files` and in .github/workflows/test.yml.

default_language_version:
  # Pinned to a specific patch (not bare '22') because Ubuntu's nodeenv 0.13.4
  # does not resolve major-only versions and would request /dist/v22/ which 404s.
  node: '22.22.2'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml
      - id: detect-private-key
        # SEC-03/SEC-05 audit docs intentionally embed a PEM-shaped fixture
        # block as the test material that proved the gitleaks gate fires.
        # Excluded by path so the hook does not block its own evidence.
        exclude: ^docs/audits/v0\.4\.0/SEC-(03-targeted-audit|05-gate-evidence)\.md$
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: [--severity=warning, --shell=bash, --external-sources]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.9.0-1
    hooks:
      - id: shfmt
        args: [-i, '2', -ci, -bn]

  - repo: https://github.com/biomejs/pre-commit
    rev: v1.9.4
    hooks:
      - id: biome-check
        files: ^plugin/cli/
        # Biome searches for biome.json from CWD upward. Pre-commit runs from
        # the repo root, so without --config-path biome would not find the
        # nested plugin/cli/biome.json and would fall back to defaults (tabs).
        args: [--config-path=plugin/cli]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      # SEC-05 (v0.4.0 Phase 8): block secret-shaped strings on every commit.
      # Configured via .gitleaks.toml at repo root (extends the upstream default
      # rule set + allowlists .planning/*.md per ADR-014 + SEC-01-gitleaks-report.md).
      - id: gitleaks

  - repo: local
    hooks:
      - id: catalog-schema-validate
        name: Validate catalog.json against schema
        entry: node plugin/cli/scripts/validate-catalog.mjs
        language: system
        files: ^plugin/catalog/(catalog|agents/.*/recipe)\.json$
        pass_filenames: false
